name: Eval

on:
  pull_request:
    paths:
      - 'lib/review-analyzer.ts'
      - 'lib/eval/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run evals
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: npm run eval

      - name: Save eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: lib/eval/reports/*.json
          retention-days: 30
