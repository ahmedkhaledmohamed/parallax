name: Parallax
options:
  bundleIdPrefix: com.ahmedkhaled
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  DEVELOPMENT_TEAM: VMXQN9K3P2
  CODE_SIGN_IDENTITY: "Apple Development"
  CODE_SIGN_STYLE: Automatic

targets:
  Parallax:
    type: application
    platform: iOS
    sources:
      - path: Parallax
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ahmedkhaled.parallax
      INFOPLIST_FILE: Parallax/Info.plist
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "13"
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: Parallax/Parallax.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ParallaxShare
        embed: true

  ParallaxShare:
    type: app-extension
    platform: iOS
    sources:
      - path: ParallaxShare
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ahmedkhaled.parallax.share
      INFOPLIST_FILE: ParallaxShare/Info.plist
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "13"
      SWIFT_VERSION: "5.9"
      CODE_SIGN_ENTITLEMENTS: ParallaxShare/ParallaxShare.entitlements
