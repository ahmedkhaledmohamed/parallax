name: Parallax
options:
  bundleIdPrefix: com.ahmedkhaled
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  DEVELOPMENT_TEAM: ""
  CODE_SIGN_IDENTITY: "Apple Development"

targets:
  Parallax:
    type: application
    platform: iOS
    sources:
      - path: Parallax
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ahmedkhaled.parallax
      INFOPLIST_FILE: Parallax/Info.plist
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: Parallax/Parallax.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ahmedkhaled.parallax

  ParallaxShare:
    type: app-extension
    platform: iOS
    sources:
      - path: ParallaxShare
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ahmedkhaled.parallax.share
      INFOPLIST_FILE: ParallaxShare/Info.plist
      SWIFT_VERSION: "5.9"
    entitlements:
      path: ParallaxShare/ParallaxShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ahmedkhaled.parallax
    dependencies:
      - target: Parallax
        embed: false
